import = ["~/.dotfiles/alacritty/themes/google.dark.toml"]

working_directory = "Code/Remote/tiger"

[cursor]
# - ▇ Block
# - _ Underline
# - | Beam
style = "Block"

[font]
size = 20.1

[font.bold]
family = "JetBrainsMono NF"
style = "Bold"

[font.italic]
family = "JetBrainsMono NF"
style = "Italic"

[font.normal]
family = "JetBrainsMono NF"
style = "Regular"

[window]
opacity = 0.9
decorations = "Buttonless"
blur = true
